# docker-compose.yml (Base file for production)
services:
  nsdc-website:
    build: .
    container_name: nsdc-website-autodeploy
    restart: unless-stopped
    environment:
      # These variables tell the college's reverse proxy how to route traffic
      - VIRTUAL_HOST=nsdc.mec.ac.in
      - VIRTUAL_PORT=80 # Nginx runs on port 80 internally
      # The WEBHOOK_SECRET is passed in at runtime for security
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      # This is ESSENTIAL for the 'git pull' strategy to work.
      # It links the host directory to the container's working directory.
      - .:/app

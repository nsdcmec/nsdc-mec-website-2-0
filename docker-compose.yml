# docker-compose.yml (FINAL for Production)
services:
  # Service 1: The Nginx Web Server (The "Mouth")
  nsdc-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nsdc-website-server
    restart: unless-stopped
    environment:
      # --- ADDED BACK ---
      # These variables tell the reverse proxy how to route traffic.
      - VIRTUAL_HOST=nsdc.mec.ac.in
      - VIRTUAL_PORT=80 # Nginx runs on port 80
    volumes:
      - web-root:/usr/share/nginx/html

  # Service 2: The Webhook Listener (The "Brain")
  webhook-listener:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nsdc-website-listener
    restart: unless-stopped
    # The listener port should NOT be exposed to the outside world in production.
    # It should only be accessible within the Docker network.
    volumes:
      - .:/app
      - web-root:/app/dist
    command: node listener.js

# Define the shared volume
volumes:
  web-root:

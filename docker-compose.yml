services:
  # This single service will run our unified container
  nsdc-render-test:
    container_name: nsdc-render-test
    build:
      context: .
      dockerfile: Dockerfile.render
      args:
        # --- BUILD ARGS ---
        # This section reads values from your .env file (or your shell)
        # and passes them to the ARG instructions in Dockerfile.render.
        - MOCK_HERO_URL=${MOCK_HERO_URL}
        - MOCK_ANNOUNCEMENTS_URL=${MOCK_ANNOUNCEMENTS_URL}
        - MOCK_ABOUT_URL=${MOCK_ABOUT_URL}
        - MOCK_EVENTS_URL=${MOCK_EVENTS_URL}
        - MOCK_PROJECTS_URL=${MOCK_PROJECTS_URL}
        - MOCK_RESOURCES_URL=${MOCK_RESOURCES_URL}
        - MOCK_TEAMS_URL=${MOCK_TEAMS_URL}
        - MOCK_TEAM_PREVIEW_URL=${MOCK_TEAM_PREVIEW_URL}
        - MOCK_LINKS_URL=${MOCK_LINKS_URL}
    ports:
      # Expose the Nginx port so you can see the website
      - "8080:8080"
    environment:
      # --- RUNTIME ENV VARS ---
      # These are passed to the running container for the listener.js script to use.
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - RENDER_DEPLOY_HOOK_URL=${RENDER_DEPLOY_HOOK_URL}

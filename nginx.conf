# nginx.conf (Corrected for SPA Routing)
user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 768;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080;
        
        # Define the root directory for all requests
        root /app/dist;

        # Tell Nginx what file to look for when a directory is requested
        index index.html;

        # Location block for the webhook listener
        # This must come BEFORE the general location block
        location /webhook {
            proxy_pass http://127.0.0.1:9001; # The internal listener port
            proxy_set_header Host $host;
        }

        # General location block to handle all other requests
        # This is the key to fixing the routing issue.
        location / {
            # 1. Try to find a file with the exact name ($uri)
            # 2. Try to find a directory with that name and serve its index file ($uri/)
            # 3. If both fail, fall back to serving the root index.html
            try_files $uri $uri/ /index.html;
        }
    }
}

# nginx.conf
user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080; # The public port Render will connect to.
        
        # Location for serving the static website files
        location / {
            root /app/dist;
            try_files $uri $uri/ /index.html;
        }

        # Location for the webhook
        # This passes any request to /webhook to our Node.js listener
        location /webhook {
            proxy_pass http://127.0.0.1:9001; # The internal listener port
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
